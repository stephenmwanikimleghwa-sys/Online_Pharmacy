name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/venv
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Create virtual environment and install dependencies
      run: |
        python -m venv $VIRTUAL_ENV
        export PATH="$VIRTUAL_ENV/bin:$PATH"
        python -m pip install --upgrade pip wheel "setuptools>=65.5.1,<81"
        pip install -r backend/requirements.txt
        pip install "setuptools>=65.5.1,<81"
        pip install flake8 pytest-django
        python -c "import pkg_resources; print('setuptools OK')"
        python -c "import django; print('Django path:', django.__file__)"
        
    - name: Lint with flake8
      run: |
        export PATH="$VIRTUAL_ENV/bin:$PATH"
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics --exclude='*/venv/*,*/test-venv/*,*/ci-venv/*,*/migrations/*'
        # exit-zero treats all errors as warnings.
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude='*/venv/*,*/test-venv/*,*/ci-venv/*,*/migrations/*'
        
    - name: Run Tests
      run: |
        export PATH="$VIRTUAL_ENV/bin:$PATH"
        cd backend
        python -c "import pkg_resources; print('pkg_resources OK')"
        python -c "import django; print('Django path:', django.__file__)"
        python manage.py test
        
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Lint
      run: |
        cd frontend
        npm run lint
        
    - name: Build
      run: |
        cd frontend
        npm run build
