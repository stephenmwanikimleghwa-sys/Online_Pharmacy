services:
  # Backend Service
  - type: web
    name: pharmacy-aggregator-backend
    runtime: docker
    region: ohio
    plan: free
    dockerfilePath: Dockerfile.render
    # preDeployCommand: runs BEFORE the new instance receives traffic.
    # This keeps the old healthy instance alive while DB migrations are applied,
    # ensuring zero-downtime deploys even when schema changes are involved.
    preDeployCommand: "python manage.py migrate --noinput --verbosity 2"
    # startCommand overrides Dockerfile CMD — just run the startup script
    startCommand: "/app/start.sh"
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,online-pharmacy-sn88.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://online-pharmacy-1-np3y.onrender.com,https://online-pharmacy-sn88.onrender.com"
      - key: FRONTEND_URL
        value: "https://online-pharmacy-1-np3y.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://online-pharmacy-sn88.onrender.com,https://online-pharmacy-1-np3y.onrender.com,https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Redis dropped 2026-07-22: the app runs with in-memory (LocMem) cache and
      # eager in-process Celery when no REDIS_URL is set. Re-add REDIS_URL /
      # CELERY_BROKER_URL / CELERY_RESULT_BACKEND here (and restore the redis
      # service below) to re-enable distributed cache + async task dispatch.

  # Frontend Service (Static Site) — must call the Django backend URL, not same-origin /api
  - type: web
    name: pharmacy-aggregator-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "18.0.0"
      # Required at build time (also defaulted in frontend/vite.config.js if missing)
      - key: VITE_API_BASE_URL
        value: https://online-pharmacy-sn88.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Redis service and Celery worker removed 2026-07-22.
  #
  # The "pharmacy-aggregator-worker" service was declared type:web with no
  # startCommand, so it inherited Dockerfile.render's CMD and ran gunicorn — a
  # redundant second copy of the web app, NOT a Celery worker. Combined with the
  # switch to eager in-process tasks (no broker), it served no purpose and just
  # consumed a free-tier slot.
  #
  # To restore async processing later: re-add the `- type: redis` service, wire
  # REDIS_URL/CELERY_BROKER_URL/CELERY_RESULT_BACKEND back into the backend
  # service, and add a real worker service with:
  #     startCommand: "celery -A config worker -l info"

