services:
  # Backend Service
  - type: web
    name: pharmacy-aggregator-backend
    runtime: docker
    region: ohio
    plan: free
    dockerfilePath: Dockerfile.render
    # preDeployCommand: runs BEFORE the new instance receives traffic.
    # This keeps the old healthy instance alive while DB migrations are applied,
    # ensuring zero-downtime deploys even when schema changes are involved.
    preDeployCommand: "python manage.py migrate --noinput --verbosity 2"
    # startCommand overrides Dockerfile CMD — just run the startup script
    startCommand: "/app/start.sh"
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,online-pharmacy-sn88.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: DATABASE_URL
        value: "postgresql://postgres:Nyashinski%40254@db.esqkftmnuaqkawewjniy.supabase.co:5432/postgres"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://online-pharmacy-1-np3y.onrender.com,https://online-pharmacy-sn88.onrender.com"
      - key: FRONTEND_URL
        value: "https://online-pharmacy-1-np3y.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://online-pharmacy-sn88.onrender.com,https://online-pharmacy-1-np3y.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REDIS_URL
        fromService:
          name: pharmacy-cache
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pharmacy-cache
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pharmacy-cache
          type: redis
          property: connectionString

  # Frontend Service (Static Site)
  - type: web
    name: pharmacy-aggregator-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "18.0.0"
      - key: VITE_API_BASE_URL
        value: https://online-pharmacy-1-np3y.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Redis Service
  - type: redis
    name: pharmacy-cache
    ipAllowList: []
    plan: free

  # Background Worker (Celery)
  - type: web
    name: pharmacy-aggregator-worker
    runtime: docker
    region: ohio
    plan: free
    dockerfilePath: Dockerfile.render
    envVars:
      - key: DEBUG
        value: "false"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: DATABASE_URL
        value: "postgresql://postgres:Nyashinski%40254@db.esqkftmnuaqkawewjniy.supabase.co:5432/postgres"
      - key: REDIS_URL
        fromService:
          name: pharmacy-cache
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pharmacy-cache
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pharmacy-cache
          type: redis
          property: connectionString
