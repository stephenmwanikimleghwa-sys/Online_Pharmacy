  <style type="text/css" data-vite-dev-id="/home/steve/pharmacy-aggregator/frontend/src/App.css">.App {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-content {
  padding: 2rem 0;
  background: transparent;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
}

.error-message {
  background-color: rgba(220, 38, 38, 0.08);
  border: 1px solid rgba(220, 38, 38, 0.25);
  color: #dc2626;
  padding: 1rem;
  border-radius: 0.5rem;
  margin: 1rem 0;
}

.loading-spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid var(--bg-field);
  border-top: 3px solid var(--color-primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

/* Responsive utilities */
@media (max-width: 768px) {
  .container {
    padding: 0 0.5rem;
  }
}

/* Pharmacy-specific styles */
.pharmacy-card {
  transition:
    transform 0.2s,
    box-shadow 0.2s;
}

.pharmacy-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 1.5rem;
}

.cart-item {
  display: flex;
  align-items: center;
  padding: 1rem;
  border-bottom: 1px solid var(--border-primary);
}

.cart-total {
  font-size: 1.25rem;
  font-weight: bold;
  color: var(--color-primary);
}

/* Global reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
/* Premium color variables - Light mode */
:root {
  --color-primary: #7c3aed;
  --color-accent: #c026d3;
  --color-highlight: #d946ef;
  --color-white: #ffffff;
  --glass-overlay: rgba(255, 255, 255, 0.08);
  --brand-mist: rgba(124, 58, 237, 0.14);
  --brand-soft: rgba(217, 70, 239, 0.08);
  --brand-border-soft: rgba(217, 70, 239, 0.22);
  --brand-highlight-soft: rgba(124, 58, 237, 0.12);
  --brand-highlight-border: rgba(124, 58, 237, 0.18);
  --pink-leak: rgba(255,80,200,0.35);
  --orb-primary: rgba(124, 58, 237, 0.95);
  --orb-secondary: rgba(192, 38, 211, 0.72);
  --orb-shadow: rgba(35, 9, 70, 0.55);
  --orb-ring: rgba(174, 72, 230, 0.88);
  --orb-ring-shadow: rgba(20, 5, 70, 0.45);
  --orb-glow: rgba(190, 120, 255, 0.9);
  --orb-glow-shadow: rgba(45, 20, 90, 0.55);
  --orb-petal: rgba(220, 140, 255, 0.48);
  --orb-flare: rgba(192, 38, 211, 0.38);
  --orb-spark: rgba(225, 140, 255, 0.6);
  --orb-spark-soft: rgba(192, 38, 211, 0.35);
  --glass-shadow-dark: rgba(0,0,0,0.35);
  --glass-shadow-soft: rgba(0,0,0,0.34);
  --glass-shadow-small: rgba(0,0,0,0.32);
  --orb-glare: rgba(255,255,255,0.15);

  --bg-gradient-light: linear-gradient(135deg, #d8a8f8 0%, #e87dd4 50%, #f06eb0 100%);
  --color-bg-light: #f5e6ff;
  --color-bg-card-light: rgba(255, 210, 245, 0.55);
  --color-field-bg-light: rgba(245, 180, 235, 0.5);
  --color-text-light: #4a0e72;
  --color-text-muted-light: #7e22ce;
  --color-border-light: rgba(160, 60, 200, 0.3);
  --btn-gradient-light: linear-gradient(135deg, #6b21c8, #a21caf);

  --bg-gradient-dark: linear-gradient(135deg, #1a0a2e 0%, #2d1250 50%, #1e0a28 100%);
  --color-bg-dark: #1a0a2e;
  --color-bg-card-dark: rgba(255, 255, 255, 0.06);
  --color-field-bg-dark: rgba(255, 255, 255, 0.05);
  --color-text-dark: #f0d0ff;
  --color-text-muted-dark: #c084fc;
  --color-border-dark: rgba(200, 120, 240, 0.25);
  --btn-gradient-dark: linear-gradient(135deg, #9d4edd, #d946ef);

  --bg-gradient: var(--bg-gradient-light);
  --bg-primary: var(--color-bg-light);
  --bg-card: var(--color-bg-card-light);
  --bg-field: var(--color-field-bg-light);
  --text-primary: var(--color-text-light);
  --text-secondary: var(--color-text-muted-light);
  --border-primary: var(--color-border-light);
  --btn-gradient: var(--btn-gradient-light);
  --text-muted: var(--color-text-muted-light);
  --glass-border: rgba(160, 60, 200, 0.3);
  --glass-shadow: 0 20px 80px rgba(124, 58, 237, 0.12);

  --font-display: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
/* Dark mode colors - Purple glass palette */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-gradient: var(--bg-gradient-dark);
    --bg-primary: var(--color-bg-dark);
    --bg-card: var(--color-bg-card-dark);
    --bg-field: var(--color-field-bg-dark);
    --text-primary: var(--color-text-dark);
    --text-secondary: var(--color-text-muted-dark);
    --border-primary: var(--color-border-dark);
    --btn-gradient: var(--btn-gradient-dark);
    --glass-border: rgba(200, 120, 240, 0.25);
    --glass-shadow: 0 20px 80px rgba(217, 70, 239, 0.14);
  }
}
/* Manual dark mode toggle support */
.dark {
  --bg-gradient: var(--bg-gradient-dark);
  --bg-primary: var(--color-bg-dark);
  --bg-card: var(--color-bg-card-dark);
  --bg-field: var(--color-field-bg-dark);
  --text-primary: var(--color-text-dark);
  --text-secondary: var(--color-text-muted-dark);
  --border-primary: var(--color-border-dark);
  --btn-gradient: var(--btn-gradient-dark);
  --glass-border: rgba(200, 120, 240, 0.25);
  --glass-shadow: 0 20px 80px rgba(217, 70, 239, 0.14);
}
/* Manual light mode — overrides prefers-color-scheme: dark when user explicitly picks light */
.light {
  --bg-gradient: var(--bg-gradient-light);
  --bg-primary: var(--color-bg-light);
  --bg-card: var(--color-bg-card-light);
  --bg-field: var(--color-field-bg-light);
  --text-primary: var(--color-text-light);
  --text-secondary: var(--color-text-muted-light);
  --border-primary: var(--color-border-light);
  --btn-gradient: var(--btn-gradient-light);
  --glass-border: rgba(160, 60, 200, 0.3);
  --glass-shadow: 0 20px 80px rgba(124, 58, 237, 0.12);
}
/* Body — rich gradient background */
body {
  font-family: var(--font-body);
  line-height: 1.8;
  color: var(--text-primary);
  background: var(--bg-gradient);
  background-attachment: fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.3s ease, color 0.3s ease;
}
/* Glassmorphism base surfaces */
.glass-panel,
.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--border-primary);
  box-shadow: var(--glass-shadow);
  border-radius: 16px;
}
.glass-card {
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
}
.glass-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 24px 80px rgba(124, 58, 237, 0.16);
}
.btn-primary {
  background: var(--btn-gradient);
  color: #ffffff;
  border: none;
  border-radius: 14px;
  box-shadow: 0 20px 70px rgba(124, 58, 237, 0.16);
}
.btn-primary:hover {
  transform: translateY(-1px);
}
.input-field {
  background: var(--bg-field);
  border: 1px solid var(--border-primary);
  color: var(--text-primary);
  border-radius: 14px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.input-field::-moz-placeholder {
  color: var(--text-secondary);
  opacity: 0.8;
}
.input-field::placeholder {
  color: var(--text-secondary);
  opacity: 0.8;
}
.text-muted {
  color: var(--text-secondary);
}
.link-secondary {
  color: var(--text-secondary);
}
.link-secondary:hover {
  color: var(--color-highlight);
}
.gradient-text {
  background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nav-premium {

.nav-link-inactive,
.nav-mobile-btn,
.nav-secondary-btn,
.nav-account-btn {

.nav-link-active,
.nav-cta-btn {

.nav-secondary-btn,

.nav-link-inactive:hover,
.nav-secondary-btn:hover,

/* Interactive transitions */
button,
a,
.clickable {
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
button:active,
a:active {
  transform: scale(0.98);
}
/* Utility classes */
.bg-primary {
  background-color: var(--primary);
}
.text-primary {
  color: var(--primary);
}
.border-primary {
  border-color: var(--primary);
}
.bg-secondary {
  background-color: var(--secondary);
}
.text-secondary {
  color: var(--secondary);
}
/* (gradient-text defined above — purple-pink) */
/* Scrollbar */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: var(--bg-primary);
}
::-webkit-scrollbar-thumb {
  background: var(--color-primary);
  border-radius: 3px;
  opacity: 0.5;
}

}
/* Smooth scroll */

}
/* Focus */

}
/* ---- Premium navigation ---- */

}

.mobile-nav-cta {

.mobile-nav-cta:hover {

.mobile-nav-link {

/* Ensure display font is applied to headings */
.font-display {

/* ---- Premium footer ---- */
.footer-premium {
  background: var(--bg-card);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid var(--border-primary);
}

  width: 100%;
  background: linear-gradient(90deg, var(--color-primary), var(--color-highlight), var(--color-accent));
  opacity: 0.85;
}

  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;

.footer-heading {

}
.footer-link:hover {

}
.footer-social-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--bg-field);
  border: 1px solid var(--border-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}
.footer-social-btn:hover {

/* ---- Semantic modal utilities ---- */
.modal-overlay {
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.modal-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-primary);
  border-radius: 24px;
  box-shadow: var(--glass-shadow);
}
.modal-header {
  background: var(--btn-gradient);
  color: #ffffff;
  padding: 2rem;
  border-radius: 20px 20px 0 0;
  position: relative;
  overflow: hidden;
}
.modal-header::after {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 100px;
  height: 100px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  filter: blur(20px);
}
/* ---- Form field utilities ---- */
.form-input {
  width: 100%;
  padding: 0.875rem 1.25rem;
  background: var(--bg-field);
  border: 1px solid var(--border-primary);
  border-radius: 14px;
  color: var(--text-primary);
  font-size: 0.9rem;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.form-input::-moz-placeholder {
  color: var(--text-secondary);
  opacity: 0.7;
}
.form-input::placeholder {
  color: var(--text-secondary);
  opacity: 0.7;
}
.form-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
}
.form-label {
  display: block;
  font-size: 0.625rem;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  margin-bottom: 0.5rem;
}
.form-cancel-btn {
  background: var(--bg-field);
  color: var(--text-secondary);
  border: 1px solid var(--border-primary);
  border-radius: 14px;
  font-weight: 700;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.875rem 1.5rem;
  transition: all 0.2s ease;
}
.form-cancel-btn:hover {
  background: rgba(124, 58, 237, 0.08);
  border-color: var(--color-primary);
  color: var(--color-primary);
}
/* ---- Alert boxes ---- */
.alert-error {
  display: flex;
  align-items: flex-start;
  gap: 0.625rem;
  padding: 0.75rem 1rem;
  background: rgba(220, 38, 38, 0.08);
  border: 1px solid rgba(220, 38, 38, 0.2);
  border-radius: 12px;
  color: #dc2626;
  font-size: 0.875rem;
}
.dark .alert-error {
  background: rgba(248, 113, 113, 0.12);
  border-color: rgba(248, 113, 113, 0.25);
  color: #fca5a5;
}
.alert-success {
  display: flex;
  align-items: flex-start;
  gap: 0.625rem;
  padding: 0.75rem 1rem;
  background: rgba(16, 185, 129, 0.08);
  border: 1px solid rgba(16, 185, 129, 0.2);
  border-radius: 12px;
  color: #059669;
  font-size: 0.875rem;
}
.dark .alert-success {
  background: rgba(52, 211, 153, 0.1);
  border-color: rgba(52, 211, 153, 0.2);
  color: #6ee7b7;
}
/* ---- Page wrapper utility ---- */
.page-bg {
  min-height: 100vh;
  background: var(--bg-gradient);
  background-attachment: fixed;
}
/* ---- Data cell utility (replaces bg-slate-50/80) ---- */
.data-cell {
  padding: 1rem;
  background: var(--bg-field);
  border: 1px solid var(--border-primary);
  border-radius: 14px;
  transition: background 0.2s ease;
}
.data-cell:hover {
  background: rgba(124, 58, 237, 0.06);
}
/* ---- Table header utility ---- */
.table-header-row {
  background: var(--bg-field);
  border-bottom: 1px solid var(--border-primary);
  backdrop-filter: blur(12px);
}
/* ============================================================
   PREMIUM MICRO-ANIMATIONS & POLISH
   ============================================================ */
/* ---- Shimmer skeleton wave ---- */
@keyframes shimmer-wave {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.animate-shimmer {
  background: linear-gradient(
    90deg,
    var(--bg-field) 25%,
    rgba(124, 58, 237, 0.12) 50%,
    var(--bg-field) 75%
  );
  background-size: 800px 100%;
  animation: shimmer-wave 1.6s ease-in-out infinite;
}
/* Override Tailwind animate-pulse to use brand colour */
.animate-pulse {
  animation: brand-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
@keyframes brand-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.45; }
}
/* ---- Page / route fade-up entrance ---- */
@keyframes page-enter {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter {
  animation: page-enter 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
}
/* ---- Card staggered entrance ---- */
@keyframes card-enter {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card-enter {
  animation: card-enter 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.card-enter-1 { animation-delay: 0.05s; }
.card-enter-2 { animation-delay: 0.10s; }
.card-enter-3 { animation-delay: 0.15s; }
.card-enter-4 { animation-delay: 0.20s; }
.card-enter-5 { animation-delay: 0.25s; }
.card-enter-6 { animation-delay: 0.30s; }
/* ---- btn-primary: sliding shimmer on hover ---- */
.btn-primary {
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255, 255, 255, 0.22) 50%,
    transparent 100%
  );
  transition: left 0.45s ease;
  pointer-events: none;
}
.btn-primary:hover::before {
  left: 160%;
}
/* ---- form-input: pulsing glow on focus ---- */
@keyframes input-glow {
  0%, 100% { box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12); }
  50%       { box-shadow: 0 0 0 5px rgba(124, 58, 237, 0.22); }
}
.form-input:focus {
  border-color: var(--color-primary);
  animation: input-glow 1.6s ease-in-out infinite;
}
/* ---- data-cell: left accent flash on hover ---- */
.data-cell {
  position: relative;
  overflow: hidden;
}
.data-cell::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 3px;
  height: 100%;
  background: var(--btn-gradient);
  border-radius: 3px 0 0 3px;
  transform: scaleY(0);
  transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  transform-origin: center;
}
.data-cell:hover::before {
  transform: scaleY(1);
}
/* ---- glass-card: enhanced hover lift + glow ---- */
.glass-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 28px 90px rgba(124, 58, 237, 0.2), 0 0 0 1px rgba(217, 70, 239, 0.12);
}
/* ---- Floating orb ambience (decorative, pointer-events none) ---- */
@keyframes orb-float {
  0%, 100% { transform: translateY(0px) scale(1); }
  50%       { transform: translateY(-14px) scale(1.04); }
}
.orb-float {
  animation: orb-float 6s ease-in-out infinite;
  pointer-events: none;
}
/* ---- Fade-in utility ---- */
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.fade-in {
  animation: fade-in 0.3s ease both;
}
/* ---- Modal scale-up entrance ---- */
@keyframes scale-up {
  from {
    opacity: 0;
    transform: scale(0.94) translateY(8px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
.animate-scale-up {
  animation: scale-up 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
}
/* ---- Toast — branded glass style ---- */
.toast-glass {
  background: var(--bg-card);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--border-primary);
  border-radius: 16px;
  box-shadow: var(--glass-shadow);
  color: var(--text-primary);
}
.toast-success-glass {
  border-color: rgba(16, 185, 129, 0.35);
  background: rgba(16, 185, 129, 0.08);
}
.toast-error-glass {
  border-color: rgba(220, 38, 38, 0.35);
  background: rgba(220, 38, 38, 0.08);
}
.toast-warning-glass {
  border-color: rgba(245, 158, 11, 0.35);
  background: rgba(245, 158, 11, 0.08);
}
.toast-info-glass {
  border-color: rgba(124, 58, 237, 0.35);
  background: rgba(124, 58, 237, 0.08);
}
/* ---- Loading spinner premium ---- */
@keyframes spin-a {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes spin-b {
  from { transform: rotate(360deg); }
  to   { transform: rotate(0deg); }
}
.spinner-premium {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.spinner-premium .ring-a,
.spinner-premium .ring-b {
  position: absolute;
  border-radius: 50%;
  border: 2.5px solid transparent;
}
.spinner-premium .ring-a {
  border-top-color: var(--color-primary);
  border-right-color: var(--color-primary);
  animation: spin-a 0.9s linear infinite;
}
.spinner-premium .ring-b {
  border-bottom-color: var(--color-accent);
  border-left-color: var(--color-accent);
  animation: spin-b 0.7s linear infinite;
  opacity: 0.7;
}
/* ============================================================
   THERMAL RECEIPT PREVIEW STYLES
   ============================================================ */
